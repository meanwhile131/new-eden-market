<!doctype html>
<html lang="en-US">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width" />
		<title>New Eden Market</title>
		<script type="module" src="./index.js"></script>
		<style>
			table, tr, th, td {
				border: 2px solid;
				border-collapse: collapse;
			}
			#token {
				margin-left: 10px;
				width: 100%;
			}
			.tokenLabel {
				display: flex;
			}
		</style>
	</head>
	<body>
		<label class="tokenLabel">Token: <input type="text" id="token"></label>
		<progress style="display: none;" id="update_progress"></progress>
		<table>
			<caption>
				Most profitable items
			</caption>
			<thead>
				<tr>
					<th rowspan="2">ID</th>
					<th colspan="4">Buy</th>
					<th colspan="4">Sell</th>
					<th rowspan="2">Potential profit</th>
				</tr>
				<tr>
					<th>Location</th>
					<th>Price</th>
					<th>Range</th>
					<th>Volume</th>
					<th>Location</th>
					<th>Price</th>
					<th>Range</th>
					<th>Volume</th>
				</tr>
			</thead>
			<tbody id="profitable">
			</tbody>
		</table>
	</body>
</html>
